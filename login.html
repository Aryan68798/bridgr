<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Prata&display=swap" rel="stylesheet"/>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Bridgr</title>
<meta name="description" content="Login to Bridgr"/>

<link rel="stylesheet" href="css/reset.css"/>
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/styles.css"/>
<link rel="stylesheet" href="css/login.css"/>
</head>
<body class="login-page">
  <div class="page-loader active" id="pageLoader">
    <div style="display: flex; flex-direction: column; align-items: center;">
      <img src="img/loading_animation.gif" alt="Loading..." class="loader-img">
      <div class="loader-text">Loading.....</div>
    </div>
  </div>

<div class="login-card">
  <!-- LEFT PANEL -->
  <div class="login-left">
    <a href="index.html" class="login-brand">BRIDGR.</a>
    <img src="img/login_doodle.png" alt="Login Doodle Illustration" />
  </div>

  <!-- RIGHT PANEL -->
  <div class="login-right">
    <a href="index.html" class="login-close" aria-label="Close">✕</a>
    
    <h1 class="login-title">Login</h1>
    
    <form class="login-form" onsubmit="event.preventDefault(); localStorage.setItem('isLoggedIn', 'true'); window.location.href='index.html';">
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="form-input-wrap">
          <span class="form-input-icon">✉️</span>
          <input type="email" class="form-input" placeholder="daniel21fisher@gmail.com" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="form-input-wrap">
          <span class="form-input-icon">👁️</span>
          <input type="password" class="form-input" placeholder="••••••••" required />
        </div>
      </div>

      <div class="form-options">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary login-submit">Log In</button>

    </form>

    <div class="login-divider">Or Continue With</div>

    <div class="social-login">
      <a href="#" class="social-btn">🅖</a>
      <a href="#" class="social-btn" style="color: var(--blue);">🅕</a>
      <a href="#" class="social-btn"></a>
    </div>

    <div class="signup-text">
      Don't have an account? <a href="#" class="signup-link">Sign Up here</a>
    </div>

  </div>
</div>

<script src="js/main.js"></script>
<script src="js/transitions.js"></script>
</body>
</html>
