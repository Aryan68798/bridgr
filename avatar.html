<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Setup Profile — Bridgr</title>
  <meta name="description" content="Customize your campus profile" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Prata&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />

  <!-- CDNs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script>window.framerMotion = window.Motion;</script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#ff5e3a',
            yellow: '#ffc800',
            blue: '#3b82f6',
            charcoal: '#111111',
            bg: '#fbf9f6',
            purple: '#7c3aed',
            green: '#16a34a',
          },
          fontFamily: {
            display: ['Prata', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['Satoshi', 'Inter', 'sans-serif'],
          },
          boxShadow: {
            'brutal': '4px 4px 0px #111111',
            'brutal-lg': '10px 10px 0px #111111',
          }
        }
      }
    }
  </script>

  <style>
    /* Grainy Texture */
    .grain-texture::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      mix-blend-mode: overlay;
    }

    .blob-jagged {
      clip-path: polygon(10% 0, 15% 5%, 25% 0, 30% 6%, 40% 0, 45% 4%, 55% 0, 60% 5%, 70% 0, 75% 6%, 85% 0, 90% 4%, 100% 0, 95% 10%, 100% 20%, 94% 30%, 100% 40%, 96% 50%, 100% 60%, 95% 70%, 100% 80%, 94% 90%, 100% 100%, 90% 95%, 80% 100%, 70% 94%, 60% 100%, 50% 95%, 40% 100%, 30% 96%, 20% 100%, 10% 95%, 0 100%, 5% 90%, 0 80%, 6% 70%, 0 60%, 4% 50%, 0 40%, 5% 30%, 0 20%, 6% 10%, 0 0);
    }

    .star-jagged {
      clip-path: polygon(50% 0%, 61% 16%, 80% 10%, 82% 30%, 100% 41%, 89% 57%, 93% 76%, 74% 82%, 63% 100%, 46% 89%, 28% 97%, 23% 78%, 4% 80%, 13% 62%, 0% 45%, 17% 31%, 10% 13%, 29% 15%, 39% 0%);
    }

    body::-webkit-scrollbar {
      display: none;
    }

    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
      background-color: #fbf9f6;
    }

    .brutal-border {
      border: 4px solid #111111;
    }

    .brutal-border-thin {
      border: 2px solid #111111;
    }

    .nav-avatar-ring {
      position: absolute;
      inset: -10px;
      border: 2px dashed #111111;
      border-radius: 50%;
      animation: spin 20s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="grain-texture">
  <div id="root" class="w-full min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = framerMotion;

    const Doodle = ({ type, color, size, pos, delay }) => {
      const paths = {
        zigzag: "M0 10 L10 0 L20 10 L30 0 L40 10",
        curve: "M0 20 Q10 0 20 20 T40 20",
        dots: "M5 5 h1 M15 5 h1 M25 5 h1"
      };

      return (
        <motion.div
          className="absolute pointer-events-none z-0"
          initial={{ opacity: 0 }}
          animate={{ opacity: 0.5 }}
          style={{ left: pos.x, top: pos.y }}
        >
          <motion.svg
            width={size * 2}
            height={size}
            viewBox={`0 0 40 20`}
            animate={{ x: [0, 10, 0], rotate: [0, 5, 0] }}
            transition={{ duration: 5, repeat: Infinity, ease: "easeInOut", delay }}
          >
            <path d={paths[type] || paths.zigzag} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" />
          </motion.svg>
        </motion.div>
      );
    };

    const Character = ({ type, color, size, pos, delay, mousePos }) => {
      const eyeRef = useRef(null);
      const [eyeOffset, setEyeOffset] = useState({ x: 0, y: 0 });

      useEffect(() => {
        if (!eyeRef.current) return;
        const rect = eyeRef.current.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = mousePos.x - centerX;
        const dy = mousePos.y - centerY;
        const angle = Math.atan2(dy, dx);
        const distance = Math.min(8, Math.hypot(dx, dy) / 50);
        setEyeOffset({ x: Math.cos(angle) * distance, y: Math.sin(angle) * distance });
      }, [mousePos]);

      const shapeClass = type === 'jagged' ? 'blob-jagged' : type === 'star' ? 'star-jagged' : 'rounded-[20%]';

      return (
        <motion.div
          className="absolute pointer-events-none z-0"
          initial={{ opacity: 0, scale: 0 }}
          animate={{ opacity: 1, scale: 1 }}
          transition={{ type: "spring", stiffness: 100, delay: delay * 0.1 }}
          style={{ left: pos.x, top: pos.y }}
        >
          <motion.div
            animate={{ y: [0, -15, 0], rotate: [0, 2, -2, 0] }}
            transition={{ duration: 5, repeat: Infinity, ease: "easeInOut", delay }}
            className={`brutal-border shadow-brutal ${shapeClass}`}
            style={{ width: size, height: size, backgroundColor: color }}
          >
            <div ref={eyeRef} className="flex gap-2.5 absolute top-1/3 left-1/2 -translate-x-1/2">
              {[1, 2].map(i => (
                <div key={i} className="w-7 h-7 bg-white brutal-border-thin rounded-full flex items-center justify-center">
                  <motion.div className="w-3.5 h-3.5 bg-charcoal rounded-full" style={{ x: eyeOffset.x, y: eyeOffset.y }} />
                </div>
              ))}
            </div>
          </motion.div>
        </motion.div>
      );
    };

    const App = () => {
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const [avatarUrl, setAvatarUrl] = useState(null);
      const [aura, setAura] = useState('linear-gradient(135deg, #fb923c, #9b6dff)');
      const [isSaving, setIsSaving] = useState(false);
      const fileInputRef = useRef(null);

      // Get current user info from multi-user storage
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const users = JSON.parse(localStorage.getItem('bridgr_users') || '{}');
      const currentUser = isLoggedIn ? (users[isLoggedIn.toLowerCase()] || users[isLoggedIn]) : { name: 'Alex Smith' };
      const [userName, setUserName] = useState(currentUser.name);

      const getInitials = (name) => {
        const parts = name.trim().split(' ');
        if (parts.length >= 2) {
          return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        } else if (parts.length === 1 && parts[0].length >= 2) {
          return parts[0].substring(0, 2).toUpperCase();
        } else if (parts.length === 1) {
          return parts[0][0].toUpperCase();
        }
        return 'AR';
      };

      const initials = getInitials(userName);

      const auras = [
        { name: 'Fire', grad: 'linear-gradient(135deg, #fb923c, #ff5e3a)', color: '#ff5e3a' },
        { name: 'Ocean', grad: 'linear-gradient(135deg, #34d399, #3b82f6)', color: '#3b82f6' },
        { name: 'Neon', grad: 'linear-gradient(135deg, #7c3aed, #ec4899)', color: '#7c3aed' },
        { name: 'Golden', grad: 'linear-gradient(135deg, #facc15, #fb923c)', color: '#ffc800' },
        { name: 'Forest', grad: 'linear-gradient(135deg, #10b981, #16a34a)', color: '#16a34a' },
      ];

      useEffect(() => {
        const handleMouseMove = (e) => setMousePos({ x: e.clientX, y: e.clientY });
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setAvatarUrl(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleSave = () => {
        setIsSaving(true);
        
        // Persist to multi-user storage
        const userKey = isLoggedIn ? isLoggedIn.toLowerCase() : null;
        if (userKey && users[userKey]) {
          users[userKey].avatar = avatarUrl;
          users[userKey].aura = aura;
          localStorage.setItem('bridgr_users', JSON.stringify(users));
        }

        setTimeout(() => {
          window.location.href = 'edit-profile.html';
        }, 1500);
      };

      return (
        <div className="w-full min-h-screen flex flex-col items-center justify-center p-6 md:p-12 relative overflow-hidden">
          <div className="absolute top-8 left-8 z-50">
            <a href="index.html" className="text-2xl font-display font-black tracking-tighter">BRIDGR.</a>
          </div>
          {/* Background Characters */}
          <div className="absolute inset-0 pointer-events-none">
            <Character type="jagged" color="#ff5e3a" size={120} pos={{ x: '5%', y: '10%' }} delay={0} mousePos={mousePos} />
            <Character type="star" color="#3b82f6" size={100} pos={{ x: '85%', y: '15%' }} delay={1} mousePos={mousePos} />
            <Character type="rect" color="#ffc800" size={80} pos={{ x: '10%', y: '75%' }} delay={2} mousePos={mousePos} />
            <Character type="jagged" color="#16a34a" size={90} pos={{ x: '80%', y: '80%' }} delay={3} mousePos={mousePos} />

            <Doodle type="zigzag" color="#ff5e3a" size={30} pos={{ x: '20%', y: '30%' }} delay={1} />
            <Doodle type="curve" color="#3b82f6" size={40} pos={{ x: '70%', y: '40%' }} delay={2} />
            <Doodle type="dots" color="#7c3aed" size={30} pos={{ x: '40%', y: '85%' }} delay={3} />
          </div>

          <motion.div
            initial={{ opacity: 0, y: 20 }}
            animate={{ opacity: 1, y: 0 }}
            className="w-full max-w-2xl bg-white brutal-border shadow-brutal-lg relative z-10 flex flex-col md:flex-row"
          >
            {/* Left side: Preview */}
            <div className="flex-1 p-8 md:p-12 flex flex-col items-center justify-center border-b-4 md:border-b-0 md:border-r-4 border-charcoal bg-bg">
              <div className="relative mb-8">
                <div className="nav-avatar-ring"></div>
                <motion.div
                  className="w-48 h-48 brutal-border rounded-full flex items-center justify-center overflow-hidden relative"
                  style={{ background: aura }}
                >
                  {avatarUrl ? (
                    <img src={avatarUrl} className="w-full h-full object-cover" alt="Avatar" />
                  ) : (
                    <span className="text-6xl font-display text-white drop-shadow-md">{initials}</span>
                  )}
                </motion.div>
                <motion.button
                  whileHover={{ scale: 1.1, rotate: 5 }}
                  whileTap={{ scale: 0.9 }}
                  onClick={() => fileInputRef.current.click()}
                  className="absolute bottom-2 right-2 w-12 h-12 bg-yellow brutal-border-thin rounded-full flex items-center justify-center text-2xl shadow-brutal cursor-pointer z-20"
                >
                  📸
                </motion.button>
              </div>
              <h2 className="text-2xl font-display uppercase text-charcoal text-center">Looking good, {userName.split(' ')[0]}!</h2>
              <p className="text-xs font-mono font-bold text-charcoal/60 uppercase mt-2 tracking-widest">Avatar Preview</p>
            </div>

            {/* Right side: Controls */}
            <div className="flex-1 p-8 md:p-12 flex flex-col justify-between">
              <div>
                <div className="mb-10">
                  <h1 className="text-5xl font-display uppercase leading-[0.9] mb-4">Upload your<br />mugshot</h1>
                  <div className="h-2 w-20 bg-orange brutal-border-thin"></div>
                </div>

                <div className="space-y-8">
                  {/* Upload Section */}
                  <div>
                    <label className="text-[10px] font-mono font-extrabold uppercase tracking-widest text-charcoal mb-3 block">1. The Photo</label>
                    <div
                      onClick={() => fileInputRef.current.click()}
                      className="group w-full py-10 px-4 bg-white brutal-border-thin hover:bg-yellow/5 hover:border-orange transition-all cursor-pointer text-center relative overflow-hidden"
                    >
                      <div className="absolute inset-0 border-2 border-dashed border-charcoal/20 pointer-events-none"></div>
                      <input
                        type="file"
                        ref={fileInputRef}
                        onChange={handleFileChange}
                        className="hidden"
                        accept="image/*"
                      />
                      <div className="text-4xl mb-3 group-hover:scale-110 transition-transform">📁</div>
                      <p className="text-base font-bold text-charcoal">Drag & drop your photo</p>
                      <p className="text-[10px] font-mono text-charcoal/60 uppercase mt-1 tracking-tighter">or <span className="text-orange underline underline-offset-4 font-black">browse files</span></p>
                    </div>
                  </div>

                  {/* Aura Picker */}
                  <div>
                    <label className="text-[10px] font-mono font-extrabold uppercase tracking-widest text-charcoal mb-3 block">2. Pick your aura</label>
                    <div className="flex flex-wrap gap-4">
                      {auras.map((a) => (
                        <motion.button
                          key={a.name}
                          whileHover={{ scale: 1.1 }}
                          whileTap={{ scale: 0.95 }}
                          onClick={() => setAura(a.grad)}
                          className={`w-12 h-12 rounded-full brutal-border transition-all ${aura === a.grad ? 'ring-4 ring-orange ring-offset-2' : ''}`}
                          style={{ background: a.grad }}
                          title={a.name}
                        />
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* Actions */}
              <div className="pt-12 flex items-stretch gap-4">
                <a
                  href="profile.html"
                  className="flex-1 flex items-center justify-center h-16 bg-white brutal-border font-bold text-center hover:bg-bg transition-all uppercase tracking-widest text-sm shadow-brutal"
                >
                  Nevermind
                </a>
                <motion.button
                  whileHover={{ translate: '-4px -4px', boxShadow: '8px 8px 0px #111111' }}
                  whileTap={{ translate: '0 0', boxShadow: '0 0 0 #111111' }}
                  onClick={handleSave}
                  disabled={isSaving}
                  className="flex-[1.5] h-16 bg-charcoal text-white brutal-border font-extrabold text-lg shadow-brutal transition-all uppercase"
                >
                  {isSaving ? 'Saving...' : 'Save Profile ➜'}
                </motion.button>
              </div>
            </div>
          </motion.div>

          <p className="mt-8 text-[10px] font-mono font-black uppercase tracking-[0.2em] text-charcoal/40">Bridgr Security Protocol — Phase 2</p>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
